<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>W1 Gestão à Vista - Office Goiânia</title>
    <link rel="stylesheet" href="style.css?v=2">
    
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <!-- PapaParse para ler CSV -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
</head>
<body class="light-theme">
    <div class="tv-dashboard">
        <header class="dashboard-header">
            <div class="header-content">
                <div class="logo-wrapper">W1</div>
                <div class="title-group">
                    <h1>Gestão à Vista - Office Goiânia</h1>
                    <p class="subtitle">Produção parcial do mês</p>
                </div>
            </div>
            <div class="update-status">
                <div class="status-dot"></div>
                <div class="update-text">
                    <span>Última atualização:</span>
                    <strong id="update-time">Carregando...</strong>
                </div>
            </div>
        </header>

        <main class="data-grid">
            <table class="w1-table">
                <thead>
                    <tr>
                        <th>Equipe</th>
                        <th class="center">AA</th>
                        <th class="center">AF</th>
                        <th class="center">AP</th>
                        <th class="center">AP Valor</th>
                        <th class="center">REC</th>
                        <th class="highlight-header center">PP Total</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr class="loading-row">
                        <td colspan="7">Sincronizando dados...</td>
                    </tr>
                </tbody>
            </table>
        </main>

        <footer class="dashboard-footer">
            <div class="footer-note">Dashboard em tempo real • W1 Consultoria</div>
        </footer>
    </div>

    <script src="app.js?v=2"></script>
</body>
</html>
