name: Atualizar Dashboard W1 a cada 20 min

on:
  push:
    branches:
      - main
  schedule:
    - cron: '5,25,45 * * * *' # Executa nos minutos 5, 25 e 45 de cada hora
  workflow_dispatch: # Permite rodar manualmente clicando em um botão no GitHub

jobs:
  extrair_dados:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar código do repositório
        uses: actions/checkout@v4

      - name: Configurar o Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependências (Pandas, Playwright, BS4, Boto3)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install beautifulsoup4

      - name: Instalar o navegador para o Playwright
        run: |
          playwright install chromium

      - name: Criar o arquivo .env secreto
        # Puxa as senhas dos "Secrets" do GitHub para não ficarem públicas no código
        run: |
          echo "CONTA1_EMAIL=${{ secrets.CONTA1_EMAIL }}" >> .env
          echo "CONTA1_SENHA=${{ secrets.CONTA1_SENHA }}" >> .env
          echo "CONTA2_EMAIL=${{ secrets.CONTA2_EMAIL }}" >> .env
          echo "CONTA2_SENHA=${{ secrets.CONTA2_SENHA }}" >> .env
          echo "R2_ACCOUNT_ID=${{ secrets.R2_ACCOUNT_ID }}" >> .env
          echo "R2_ACCESS_KEY_ID=${{ secrets.R2_ACCESS_KEY_ID }}" >> .env
          echo "R2_SECRET_ACCESS_KEY=${{ secrets.R2_SECRET_ACCESS_KEY }}" >> .env
          echo "R2_BUCKET=${{ secrets.R2_BUCKET }}" >> .env

      - name: Rodar o Robô de Extração
        run: |
          python robo.py
